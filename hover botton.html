<!DOCTYPE html>
<html>
    <head>
        <title>
            Botton hover effect
        </title>
        <style>
            button{
                margin-top: 20px;
                position: relative;
                border: none;
                transition: 0.5s ease-in;
                z-index: 1;
                width: 100px;
                
                
                
              
                border: 1px rgb(255, 255, 255) solid;
            }
            button::before,
            button::after{
                position: absolute;
                content: "";
                z-index: -1;
                
            }
            .btn-1:hover{
                box-shadow: inset -10.5em 0 0 0 #ff0000,inset 10.5em 0 0 0 #002fff;
                transition: 2s ease-in;
                
            }
            .btn-2:hover{
                
                box-shadow: inset -10.5em 0 0 0  #ff0000;
                transition: 2s ease-in;
                height: 100%;
              
            }
           
           
            
            .btn-3:hover{
                background:  #ff98ad;
                box-shadow:  0 0   5px #ff98ad, 0 0   25px #ff96ad, 0 0   50px #ff96ad, 0 0   5000px #ff96ad
                
            }
            .btn-4:hover{
                box-shadow: 2px 2px 0px 0px #ff96ad;
                /* top: -5px;  */
                 /* left: 5px; */
                 /* right: 4px; */
               /* height: 100px;
               width:100px; */
              transition-duration: 4s ease-in;
                 
            }
            not working to button */
            .btn-5::after{
                height: 100%;
                left: -35%;
                top: 0;
                transform: skew(50deg);
                transition-duration: 0.6s;
                transform-origin: top left;
                width: 0;
            }
            .btn-5:hover:after{
                height: 100%;
                width: 135%; 
            }
            .btn-6:hover{
                box-shadow: inset 10.5em 0 0 0 #002fff;
                transition: 1s ease-in;
            }
            .btn-7:hover{
                border: 1px solid #ff96ad;
                color: #ff96ad;
                background-color: #17181c;
                transition: 1s ease-in-out;
            }



        </style>
    </head>
    <body>
        <center>
        <div>
             <button class="btn-1">Botton 1</botton>
        </div>        
        <div>
            <button class="btn-2">Botton 2</botton>
            </div>
            <div>
            <button class="btn-3" style="border: 1px whaite sloid;" >Botton 3</botton>
            </div>
            <div>
            <button class="btn-4">Botton 4</botton>
            </div>
            <div>
            <div>
            <div>
           
            <button class="btn-6">Botton 5</botton>
            </div>
            <button class="btn-7">Botton 7</botton>
           
            </div>
            </center>
    </body>
</html>
